<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Games</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #111827;
    --card: #1f2937;
    --card2: #334155;
    --accent: #22c55e;
    --accent2: #38bdf8;
    --text: #f8fafc;
    --muted: #cbd5e1;
    --matched: #4ade80;
    --selected: #f59e0b;
    --danger: #fb7185;
  }

  * { box-sizing: border-box; }

  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 18px 14px 28px;
  }

  .wrap {
    max-width: 440px;
    margin: 0 auto;
  }

  h1 {
    margin: 8px 0 10px;
    font-size: 30px;
  }

  .panel {
    background: var(--panel);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 14px;
  }

  .controls {
    display: grid;
    gap: 10px;
  }

  select, button {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border-radius: 12px;
    border: 0;
  }

  select {
    background: #e2e8f0;
    color: #0f172a;
  }

  .button-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  button {
    background: var(--accent2);
    color: #082f49;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #auxBtn.hidden { display: none; }

  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 12px;
  }

  .stat {
    background: #0b1220;
    border-radius: 12px;
    padding: 10px;
  }

  .label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .value {
    font-size: 22px;
    font-weight: 700;
  }

  #subtitle {
    color: var(--muted);
    margin: 10px 0 0;
    line-height: 1.35;
  }

  #memoryGame {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 360px;
    margin: 0 auto;
  }

  .memory-card, .stack-tile {
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .memory-card {
    width: 100%;
    aspect-ratio: 1;
    background: var(--card);
    border-radius: 12px;
    font-size: 30px;
    cursor: pointer;
    transition: transform 0.18s ease, background 0.2s ease;
  }

  .memory-card.flipped {
    background: var(--accent);
    color: #052e16;
    transform: scale(1.03);
  }

  .memory-card.matched {
    background: var(--matched);
    color: #052e16;
  }

  #stackerGame {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    max-width: 404px;
    margin: 0 auto;
    min-height: 360px;
  }

  .stack-tile {
    aspect-ratio: 1;
    background: var(--card2);
    border-radius: 12px;
    font-size: 28px;
    cursor: pointer;
    transition: transform 0.16s ease, background 0.2s ease, opacity 0.2s ease;
  }

  .stack-tile.empty {
    opacity: 0;
    pointer-events: none;
  }

  .stack-tile.hole {
    visibility: hidden;
    pointer-events: none;
  }

  .stack-tile.highlight {
    outline: 3px solid rgba(255,255,255,0.2);
    transform: scale(1.05);
  }

  .hidden {
    display: none !important;
  }

  #message {
    margin-top: 14px;
    min-height: 24px;
    color: var(--muted);
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Quick Games</h1>

    <div class="panel controls">
      <select id="gamePicker">
        <option value="memory">Memory Match</option>
        <option value="stacker">Stacker</option>
      </select>
      <div class="button-row">
        <button id="newGameBtn">New Game</button>
        <button id="auxBtn" class="hidden">Shuffle</button>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="label" id="stat1Label">Moves</div>
          <div class="value" id="stat1Value">0</div>
        </div>
        <div class="stat">
          <div class="label" id="stat2Label">Progress</div>
          <div class="value" id="stat2Value">0/8</div>
        </div>
      </div>
      <p id="subtitle">Flip two matching tiles.</p>
    </div>

    <div class="panel">
      <div id="memoryGame"></div>
      <div id="stackerGame" class="hidden"></div>
      <div id="message"></div>
    </div>
  </div>

<script>
  const picker = document.getElementById('gamePicker');
  const newGameBtn = document.getElementById('newGameBtn');
  const auxBtn = document.getElementById('auxBtn');
  const stat1Label = document.getElementById('stat1Label');
  const stat1Value = document.getElementById('stat1Value');
  const stat2Label = document.getElementById('stat2Label');
  const stat2Value = document.getElementById('stat2Value');
  const subtitle = document.getElementById('subtitle');
  const message = document.getElementById('message');
  const memoryGameEl = document.getElementById('memoryGame');
  const stackerGameEl = document.getElementById('stackerGame');

  function shuffle(array) {
    const a = [...array];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const memory = {
    icons: ['🍎','🍌','🍇','🍊','🍒','🍉','🥝','🍍'],
    cards: [],
    flipped: [],
    moves: 0,
    matches: 0,
    lock: false,

    start() {
      this.cards = shuffle([...this.icons, ...this.icons]);
      this.flipped = [];
      this.moves = 0;
      this.matches = 0;
      this.lock = false;
      memoryGameEl.innerHTML = '';
      message.textContent = '';

      this.cards.forEach((emoji) => {
        const card = document.createElement('div');
        card.className = 'memory-card';
        card.dataset.emoji = emoji;
        card.addEventListener('click', () => this.flip(card));
        memoryGameEl.appendChild(card);
      });

      stat1Label.textContent = 'Moves';
      stat2Label.textContent = 'Progress';
      subtitle.textContent = 'Flip two matching tiles.';
      auxBtn.classList.add('hidden');
      this.updateStats();
    },

    updateStats() {
      stat1Value.textContent = this.moves;
      stat2Value.textContent = `${this.matches}/8`;
    },

    flip(card) {
      if (this.lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;

      card.classList.add('flipped');
      card.textContent = card.dataset.emoji;
      this.flipped.push(card);

      if (this.flipped.length !== 2) return;

      this.moves += 1;
      this.updateStats();
      const [a, b] = this.flipped;

      if (a.dataset.emoji === b.dataset.emoji) {
        a.classList.add('matched');
        b.classList.add('matched');
        this.flipped = [];
        this.matches += 1;
        this.updateStats();

        if (this.matches === 8) {
          message.textContent = `Nice — cleared in ${this.moves} moves.`;
        }
        return;
      }

      this.lock = true;
      setTimeout(() => {
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        a.textContent = '';
        b.textContent = '';
        this.flipped = [];
        this.lock = false;
      }, 800);
    }
  };

  const stacker = {
    rows: 8,
    cols: 7,
    holes: new Set(['0,0','0,6','7,0','7,6']),
    symbols: ['🟦','🟪','🟩','🟥','🟨','🟧'],
    board: [],
    score: 0,
    moves: 0,
    highlight: [],

    start() {
      this.score = 0;
      this.moves = 0;
      this.highlight = [];
      this.generateBoard();
      stat1Label.textContent = 'Clears';
      stat2Label.textContent = 'Tiles Left';
      subtitle.textContent = 'Tap connected groups of 3 or more matching tiles. The board drops down after each clear. Bigger groups are better.';
      auxBtn.textContent = 'Shuffle';
      auxBtn.classList.remove('hidden');
      message.textContent = 'Stacker is now a larger match-3 style puzzle.';
      this.updateStats();
      this.render();
    },

    generateBoard() {
      do {
        this.board = Array.from({ length: this.rows }, () => Array(this.cols).fill(null));
        const activeCells = [];

        for (let r = 0; r < this.rows; r++) {
          for (let c = 0; c < this.cols; c++) {
            if (!this.holes.has(`${r},${c}`)) activeCells.push([r, c]);
          }
        }

        activeCells.forEach(([r, c]) => {
          this.board[r][c] = this.symbols[Math.floor(Math.random() * this.symbols.length)];
        });
      } while (!this.hasPlayableGroup());
    },

    updateStats() {
      stat1Value.textContent = this.moves;
      stat2Value.textContent = String(this.countTiles());
    },

    countTiles() {
      let total = 0;
      for (let r = 0; r < this.rows; r++) {
        for (let c = 0; c < this.cols; c++) {
          if (this.board[r][c]) total += 1;
        }
      }
      return total;
    },

    getNeighbors(r, c) {
      return [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]]
        .filter(([nr, nc]) => nr >= 0 && nr < this.rows && nc >= 0 && nc < this.cols);
    },

    getGroup(r, c) {
      const symbol = this.board[r][c];
      if (!symbol) return [];
      const stack = [[r, c]];
      const seen = new Set([`${r},${c}`]);
      const group = [];

      while (stack.length) {
        const [cr, cc] = stack.pop();
        group.push([cr, cc]);
        this.getNeighbors(cr, cc).forEach(([nr, nc]) => {
          if (this.board[nr][nc] === symbol && !seen.has(`${nr},${nc}`)) {
            seen.add(`${nr},${nc}`);
            stack.push([nr, nc]);
          }
        });
      }

      return group;
    },

    hasPlayableGroup() {
      for (let r = 0; r < this.rows; r++) {
        for (let c = 0; c < this.cols; c++) {
          if (this.board[r][c] && this.getGroup(r, c).length >= 3) {
            return true;
          }
        }
      }
      return false;
    },

    applyGravity() {
      for (let c = 0; c < this.cols; c++) {
        const availableRows = [];
        for (let r = this.rows - 1; r >= 0; r--) {
          if (!this.holes.has(`${r},${c}`)) availableRows.push(r);
        }
        const values = [];
        for (let i = 0; i < availableRows.length; i++) {
          const r = availableRows[i];
          if (this.board[r][c]) values.push(this.board[r][c]);
        }
        for (let i = 0; i < availableRows.length; i++) {
          const r = availableRows[i];
          this.board[r][c] = values[i] || null;
        }
      }
    },

    shuffleBoard() {
      const remaining = [];
      for (let r = 0; r < this.rows; r++) {
        for (let c = 0; c < this.cols; c++) {
          if (this.board[r][c]) remaining.push(this.board[r][c]);
        }
      }

      if (remaining.length === 0) return;

      do {
        const pool = shuffle(remaining);
        let index = 0;
        for (let r = 0; r < this.rows; r++) {
          for (let c = 0; c < this.cols; c++) {
            if (this.holes.has(`${r},${c}`)) continue;
            if (this.board[r][c] !== null) {
              this.board[r][c] = pool[index];
              index += 1;
            }
          }
        }
      } while (!this.hasPlayableGroup());

      this.highlight = [];
      this.render();
      message.textContent = 'Board shuffled.';
    },

    tap(r, c) {
      if (!this.board[r][c]) return;
      const group = this.getGroup(r, c);

      if (group.length < 3) {
        this.highlight = group;
        this.render();
        message.textContent = 'Need at least 3 connected matching tiles.';
        return;
      }

      group.forEach(([gr, gc]) => {
        this.board[gr][gc] = null;
      });
      this.moves += 1;
      this.score += group.length;
      this.highlight = [];
      this.applyGravity();

      if (this.countTiles() === 0) {
        this.updateStats();
        this.render();
        message.textContent = `Board cleared in ${this.moves} clears. Nice.`;
        return;
      }

      if (!this.hasPlayableGroup()) {
        this.shuffleBoard();
      }

      this.updateStats();
      this.render();
      message.textContent = `Cleared ${group.length} tiles.`;
    },

    render() {
      stackerGameEl.innerHTML = '';
      const highlightSet = new Set(this.highlight.map(([r, c]) => `${r},${c}`));

      for (let r = 0; r < this.rows; r++) {
        for (let c = 0; c < this.cols; c++) {
          const tile = document.createElement('div');
          tile.className = 'stack-tile';
          const key = `${r},${c}`;

          if (this.holes.has(key)) {
            tile.classList.add('hole');
          } else if (!this.board[r][c]) {
            tile.classList.add('empty');
          } else {
            tile.textContent = this.board[r][c];
            if (highlightSet.has(key)) tile.classList.add('highlight');
            tile.addEventListener('click', () => this.tap(r, c));
          }

          stackerGameEl.appendChild(tile);
        }
      }
    }
  };

  function showGame(name) {
    const isMemory = name === 'memory';
    memoryGameEl.classList.toggle('hidden', !isMemory);
    stackerGameEl.classList.toggle('hidden', isMemory);
    message.textContent = '';

    if (isMemory) {
      memory.start();
    } else {
      stacker.start();
    }
  }

  picker.addEventListener('change', () => showGame(picker.value));
  newGameBtn.addEventListener('click', () => showGame(picker.value));
  auxBtn.addEventListener('click', () => {
    if (picker.value === 'stacker') stacker.shuffleBoard();
  });

  showGame('memory');
</script>
</body>
</html>
